<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Component Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            padding: 20px;
            background: #1a1a2e;
            color: #e5e7eb;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #2b2b3d;
            padding: 30px;
            border-radius: 12px;
        }
        h1 { color: #8b5cf6; margin-bottom: 20px; }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }
        .status { 
            display: inline-block;
            padding: 5px 10px;
            border-radius: 4px;
            margin-left: 10px;
        }
        .status.pass { background: #10b981; color: white; }
        .status.fail { background: #ef4444; color: white; }
        button {
            background: #8b5cf6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover { background: #7c3aed; }
        .result {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Upload Component Fix Verification</h1>
        
        <div class="test-section">
            <h3>Test 1: Check File Input Element</h3>
            <button onclick="checkFileInput()">Run Test</button>
            <div id="file-input-result" class="result"></div>
        </div>
        
        <div class="test-section">
            <h3>Test 2: Check Upload Button ID References</h3>
            <button onclick="checkUploadReferences()">Run Test</button>
            <div id="upload-ref-result" class="result"></div>
        </div>
        
        <div class="test-section">
            <h3>Test 3: Check New Chat Button Removal</h3>
            <button onclick="checkNewChatButton()">Run Test</button>
            <div id="newchat-result" class="result"></div>
        </div>
        
        <div class="test-section">
            <h3>Test All</h3>
            <button onclick="runAllTests()">Run All Tests</button>
            <button onclick="window.open('http://localhost:9000/chatbot', '_blank')">Open Chatbot</button>
        </div>
    </div>
    
    <script>
        async function checkFileInput() {
            const result = document.getElementById('file-input-result');
            try {
                const response = await fetch('http://localhost:9000/chatbot');
                const html = await response.text();
                
                // Check if file input with correct ID exists
                const hasDocUpload = html.includes('id="doc-upload"');
                const hasFileInput = html.includes('type="file"');
                
                result.innerHTML = `
                    File input with id="doc-upload": <span class="status ${hasDocUpload ? 'pass' : 'fail'}">${hasDocUpload ? 'FOUND' : 'NOT FOUND'}</span><br>
                    File input element: <span class="status ${hasFileInput ? 'pass' : 'fail'}">${hasFileInput ? 'FOUND' : 'NOT FOUND'}</span>
                `;
            } catch (error) {
                result.innerHTML = `Error: ${error.message}`;
            }
        }
        
        async function checkUploadReferences() {
            const result = document.getElementById('upload-ref-result');
            try {
                const response = await fetch('http://localhost:9000/static/js/document-attachment-manager.js');
                const js = await response.text();
                
                // Check for corrected references
                const hasCorrectReference = js.includes("getElementById('doc-upload')");
                const hasWrongReference = js.includes("getElementById('document-upload')");
                
                result.innerHTML = `
                    Correct reference (doc-upload): <span class="status ${hasCorrectReference ? 'pass' : 'fail'}">${hasCorrectReference ? 'FIXED' : 'NOT FOUND'}</span><br>
                    Wrong reference (document-upload): <span class="status ${!hasWrongReference ? 'pass' : 'fail'}">${!hasWrongReference ? 'REMOVED' : 'STILL EXISTS'}</span>
                `;
            } catch (error) {
                result.innerHTML = `Error: ${error.message}`;
            }
        }
        
        async function checkNewChatButton() {
            const result = document.getElementById('newchat-result');
            try {
                const response = await fetch('http://localhost:9000/chatbot');
                const html = await response.text();
                
                // Check if the new chat button was removed from sidebar
                const buttonInSidebar = html.includes('<button class="new-chat-btn" id="new-chat-btn">');
                const newChatIcon = html.includes('id="new-chat-icon"');
                
                result.innerHTML = `
                    New Chat button in sidebar: <span class="status ${!buttonInSidebar ? 'pass' : 'fail'}">${!buttonInSidebar ? 'REMOVED ✓' : 'STILL EXISTS'}</span><br>
                    New Chat icon (floating): <span class="status ${newChatIcon ? 'pass' : 'fail'}">${newChatIcon ? 'EXISTS ✓' : 'NOT FOUND'}</span>
                `;
            } catch (error) {
                result.innerHTML = `Error: ${error.message}`;
            }
        }
        
        async function runAllTests() {
            console.log('Running all tests...');
            await checkFileInput();
            await checkUploadReferences();
            await checkNewChatButton();
        }
        
        // Run tests on load
        window.addEventListener('load', runAllTests);
    </script>
</body>
</html>
