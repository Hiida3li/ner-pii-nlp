<!DOCTYPE html>
<html>
<head>
    <title>Test Attachment Display</title>
    <style>
        body {
            background: #202023;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        .chat-messages {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .message-wrapper {
            margin-bottom: 20px;
        }
        
        .message {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }
        
        .message.user {
            flex-direction: row-reverse;
        }
        
        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #4a4a4a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            flex-shrink: 0;
        }
        
        .message-content {
            background: #303030;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 1.25rem;
            border-radius: 18px;
            max-width: 70%;
            position: relative;
        }
        
        /* FIXED: Attachment inside message */
        .message-attachments {
            margin: -1rem -1.25rem 0.75rem -1.25rem;
            padding: 0.75rem 1.25rem;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px 18px 0 0;
        }
        
        .document-attachment-card {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            font-size: 12px;
        }
        
        .doc-icon-wrapper {
            width: 28px;
            height: 28px;
            background: rgba(139, 92, 246, 0.2);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .doc-icon-wrapper svg {
            width: 16px;
            height: 16px;
            color: #a78bfa;
        }
        
        .doc-filename {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
        }
        
        .doc-metadata {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.6);
        }
        
        .message-text {
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="chat-messages">
        <h3 style="color: white; margin-bottom: 30px;">Test: Document should appear INSIDE the message bubble</h3>
        
        <!-- Message with attachment -->
        <div class="message-wrapper">
            <div class="message user">
                <div class="message-avatar">U</div>
                <div class="message-content">
                    <div class="message-attachments">
                        <div class="document-attachment-card">
                            <div class="doc-icon-wrapper">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                    <polyline points="14,2 14,8 20,8"/>
                                </svg>
                            </div>
                            <div class="doc-info">
                                <div class="doc-filename">test_document.txt</div>
                                <div class="doc-metadata">150 words • 5 entities</div>
                            </div>
                        </div>
                    </div>
                    <div class="message-text">
                        Analyze this document for me
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Regular message without attachment -->
        <div class="message-wrapper">
            <div class="message assistant">
                <div class="message-avatar">AI</div>
                <div class="message-content">
                    <div class="message-text">
                        I'll analyze the document for you. The document contains personal information that has been identified and masked.
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
