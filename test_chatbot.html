<!DOCTYPE html>
<html>
<head>
    <title>Test Privacy Chat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        button {
            background: #10a37f;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
        #response {
            margin-top: 20px;
            padding: 15px;
            background: #f0f0f0;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>Privacy Chat Test</h1>
    
    <button onclick="testChat()">Test Chat with PII</button>
    
    <div id="response"></div>

    <script>
        async function testChat() {
            const responseDiv = document.getElementById('response');
            responseDiv.textContent = 'Testing...';

            try {
                const response = await fetch('/api/privacy-chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        message: 'Hi, I am John Smith from Microsoft',
                        privacy_mode: true,
                        session_id: 1
                    })
                });

                const data = await response.json();
                responseDiv.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                responseDiv.textContent = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
