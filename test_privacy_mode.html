<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test Privacy Mode Fix</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            direction: rtl;
        }
        .entity-highlight {
            padding: 2px 4px;
            border-radius: 3px;
            font-weight: 500;
        }
        .test-case {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <h1>Test Privacy Mode with Mixed Arabic-Placeholder</h1>
    
    <div class="test-case">
        <h3>Test Case: سلطنة Location2</h3>
        <p>Original highlighted text:</p>
        <div id="original" class="result"></div>
        
        <p>After privacy mode replacement:</p>
        <div id="replaced" class="result"></div>
    </div>

    <script>
        // Simulate the entity data
        const testData = {
            highlighted_text: 'توجد في <span class="entity-highlight" style="background-color: #2196F3; color: #212529;">سلطنة Location2</span> العديد من الجمعيات',
            entities: [
                {
                    text: "سلطنة Location2",
                    entity_type: "LOC",
                    start: 8,
                    end: 23
                }
            ]
        };
        
        // Show original
        document.getElementById('original').innerHTML = testData.highlighted_text;
        
        // Apply the fixed replacement logic
        function applyEntityDictionaryReplacement(highlightedText, entities) {
            if (!entities || entities.length === 0) return highlightedText;
            
            const sortedEntities = [...entities].sort((a, b) => b.start - a.start);
            let result = highlightedText;
            
            // Pattern to detect existing placeholders
            const placeholderPattern = /(Person|Location|Organization|Email|Phone|Url|Civilid|Passport|Creditcard)\d+/gi;
            
            sortedEntities.forEach(entity => {
                const text = entity.text;
                const entityType = entity.entity_type;
                let replacement;
                
                // Check if entity text already contains a placeholder
                const placeholderMatch = text.match(placeholderPattern);
                if (placeholderMatch) {
                    // Entity already contains a placeholder, extract and use it
                    replacement = placeholderMatch[0];
                    console.log(`Found placeholder in entity "${text}": ${replacement}`);
                } else {
                    // For testing, use a generic replacement
                    replacement = `[${entityType}]`;
                    console.log(`No placeholder in entity "${text}", using: ${replacement}`);
                }
                
                // Escape special regex characters in the entity text
                const escapedText = text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                
                // Create regex to find and replace the entity text within HTML spans
                const entityRegex = new RegExp(
                    `<span[^>]*class="[^"]*entity-highlight[^"]*"[^>]*>([^<]*${escapedText}[^<]*)</span>`,
                    'gi'
                );
                
                result = result.replace(entityRegex, (match, entityContent) => {
                    const newContent = entityContent.replace(new RegExp(escapedText, 'gi'), replacement);
                    return match.replace(entityContent, newContent);
                });
            });
            
            return result;
        }
        
        // Apply replacement and show result
        const replacedText = applyEntityDictionaryReplacement(testData.highlighted_text, testData.entities);
        document.getElementById('replaced').innerHTML = replacedText;
    </script>
</body>
</html>
