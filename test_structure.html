<!DOCTYPE html>
<html>
<head>
    <title>Test Message Structure</title>
    <style>
        body {
            background: #202023;
            padding: 20px;
            font-family: -apple-system, sans-serif;
            color: white;
        }
        
        .chat-messages {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .message-wrapper {
            margin-bottom: 20px;
        }
        
        .message {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }
        
        .message.user {
            flex-direction: row-reverse;
        }
        
        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #4a4a4a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            flex-shrink: 0;
        }
        
        /* THE KEY: message-content IS the bubble that contains EVERYTHING */
        .message-content {
            background: #303030;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 1.25rem;
            border-radius: 18px;
            max-width: 70%;
            /* Visual indicator */
            box-shadow: 0 0 0 3px lime;
        }
        
        /* Attachment section INSIDE the bubble */
        .message-attachments {
            margin: -0.5rem -0.75rem 0.75rem -0.75rem;
            padding: 0.5rem 0.75rem;
            background: rgba(139, 92, 246, 0.1);
            border-bottom: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 12px 12px 0 0;
        }
        
        .document-attachment-card {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            background: rgba(139, 92, 246, 0.15);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 6px;
            font-size: 12px;
        }
        
        .doc-icon-wrapper {
            width: 24px;
            height: 24px;
            background: rgba(139, 92, 246, 0.3);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .doc-filename {
            font-weight: 500;
        }
        
        .doc-metadata {
            font-size: 10px;
            opacity: 0.7;
        }
        
        .message-text {
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="chat-messages">
        <h2>Correct Structure - Attachment INSIDE Message Bubble</h2>
        <p style="color: lime;">Green outline = message-content (the bubble)</p>
        
        <!-- This is the CORRECT structure -->
        <div class="message-wrapper">
            <div class="message user">
                <div class="message-avatar">U</div>
                
                <!-- THIS IS THE BUBBLE - EVERYTHING GOES INSIDE -->
                <div class="message-content">
                    
                    <!-- Attachment is FIRST, INSIDE the bubble -->
                    <div class="message-attachments">
                        <div class="document-attachment-card">
                            <div class="doc-icon-wrapper">📄</div>
                            <div class="doc-info">
                                <div class="doc-filename">document.txt</div>
                                <div class="doc-metadata">150 words • 5 entities</div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Text is SECOND, also INSIDE the bubble -->
                    <div class="message-text">
                        Analyze this document for PII entities
                    </div>
                    
                </div>
                <!-- END OF BUBBLE -->
                
            </div>
        </div>
        
        <!-- Regular message without attachment -->
        <div class="message-wrapper">
            <div class="message assistant">
                <div class="message-avatar">AI</div>
                <div class="message-content">
                    <div class="message-text">
                        I found 5 entities in your document including names and email addresses.
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Show the structure in console
        console.log('CORRECT STRUCTURE:');
        console.log('message-wrapper');
        console.log('  └─ message');
        console.log('      ├─ message-avatar');
        console.log('      └─ message-content (THE BUBBLE)');
        console.log('          ├─ message-attachments (INSIDE)');
        console.log('          │   └─ document-attachment-card');
        console.log('          └─ message-text (INSIDE)');
    </script>
</body>
</html>
