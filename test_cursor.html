<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursor Test</title>
    <style>
        body {
            cursor: none;
            font-family: Arial, sans-serif;
            padding: 50px;
            background: #1a1a1a;
            color: #fff;
        }
        
        .custom-cursor {
            width: 24px;
            height: 24px;
            border: 2px solid transparent;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.8), rgba(59, 130, 246, 0.2));
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            top: 0;
            left: 0;
            opacity: 1;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), 
                        background 0.2s ease,
                        border-color 0.2s ease,
                        box-shadow 0.2s ease;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5),
                        0 0 40px rgba(59, 130, 246, 0.3),
                        inset 0 0 8px rgba(255, 255, 255, 0.3);
            animation: cursorPulse 2s ease-in-out infinite;
        }
        
        @keyframes cursorPulse {
            0%, 100% {
                box-shadow: 0 0 20px rgba(59, 130, 246, 0.5),
                            0 0 40px rgba(59, 130, 246, 0.3),
                            inset 0 0 8px rgba(255, 255, 255, 0.3);
            }
            50% {
                box-shadow: 0 0 30px rgba(59, 130, 246, 0.7),
                            0 0 60px rgba(59, 130, 246, 0.4),
                            inset 0 0 12px rgba(255, 255, 255, 0.5);
            }
        }
        
        .custom-cursor.active {
            transform: translate(-50%, -50%) scale(0.7);
            background: radial-gradient(circle, rgba(16, 185, 129, 0.9), rgba(16, 185, 129, 0.3));
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.7),
                        0 0 60px rgba(16, 185, 129, 0.4);
        }
        
        .custom-cursor.hover {
            border-color: #10b981;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.8), rgba(16, 185, 129, 0.2));
            transform: translate(-50%, -50%) scale(1.5);
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.6),
                        0 0 50px rgba(16, 185, 129, 0.4);
        }
        
        button {
            padding: 10px 20px;
            margin: 10px;
            cursor: none;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 5px;
        }
        
        #status {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="custom-cursor"></div>
    
    <h1>Cursor Test Page</h1>
    <p>Move your mouse around to test the custom cursor</p>
    
    <button>Test Button 1</button>
    <button>Test Button 2</button>
    <button>Test Button 3</button>
    
    <div id="status">
        <div>Mouse X: <span id="mouseX">0</span></div>
        <div>Mouse Y: <span id="mouseY">0</span></div>
        <div>Cursor Visible: <span id="cursorVisible">Yes</span></div>
    </div>
    
    <script>
        const cursor = document.querySelector('.custom-cursor');
        const mouseXSpan = document.getElementById('mouseX');
        const mouseYSpan = document.getElementById('mouseY');
        const cursorVisibleSpan = document.getElementById('cursorVisible');
        
        if (!cursor) {
            console.error('Custom cursor element not found!');
            cursorVisibleSpan.textContent = 'ERROR: Not Found';
        } else {
            console.log('Cursor element found:', cursor);
            
            let mouseX = 0;
            let mouseY = 0;
            let currentX = 0;
            let currentY = 0;
            let isMoving = false;
            
            // Track mouse movement
            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
                
                mouseXSpan.textContent = mouseX;
                mouseYSpan.textContent = mouseY;
                
                if (!isMoving) {
                    isMoving = true;
                    requestAnimationFrame(updateCursor);
                }
            });
            
            // Smooth cursor animation
            function updateCursor() {
                currentX += (mouseX - currentX) * 0.9;
                currentY += (mouseY - currentY) * 0.9;
                
                cursor.style.left = currentX + 'px';
                cursor.style.top = currentY + 'px';
                
                if (Math.abs(mouseX - currentX) > 0.1 || Math.abs(mouseY - currentY) > 0.1) {
                    requestAnimationFrame(updateCursor);
                } else {
                    isMoving = false;
                }
            }
            
            // Click effects
            document.addEventListener('mousedown', () => {
                cursor.classList.add('active');
            });
            
            document.addEventListener('mouseup', () => {
                cursor.classList.remove('active');
            });
            
            // Hover effects
            const buttons = document.querySelectorAll('button');
            buttons.forEach(btn => {
                btn.addEventListener('mouseenter', () => {
                    cursor.classList.add('hover');
                });
                
                btn.addEventListener('mouseleave', () => {
                    cursor.classList.remove('hover');
                });
            });
            
            // Check cursor visibility
            setInterval(() => {
                const opacity = window.getComputedStyle(cursor).opacity;
                cursorVisibleSpan.textContent = opacity === '1' ? 'Yes' : 'No';
            }, 100);
        }
    </script>
</body>
</html>
