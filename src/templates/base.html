<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PII-Shield - Advanced Data Protection{% endblock %}</title>
    <meta name="description" content="{% block description %}Advanced AI-powered platform for detecting and protecting personally identifiable information{% endblock %}">
    <meta name="author" content="PII-Shield">
    
    <!-- Google Fonts for Arabic support -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Preload critical resources -->
    <link rel="preload" href="/static/css/styles.css" as="style">
    
    <!-- CSS -->
    <link rel="stylesheet" href="/static/css/styles.css">
    
    <!-- Theme detection script - Default to dark theme -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('pii-shield-theme');
            const theme = savedTheme || 'dark'; // Default to dark theme
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    
    <!-- Custom Cursor Styles -->
    <style>
        /* Force cursor to be none on ALL elements */
        *, *::before, *::after {
            cursor: none !important;
        }
        
        html, body {
            cursor: none !important;
        }
        
        /* Override any inline styles */
        *[style*="cursor"] {
            cursor: none !important;
        }
        
        .custom-cursor {
            width: 20px;
            height: 20px;
            background: radial-gradient(circle,
                rgba(59, 130, 246, 0.8) 0%,
                rgba(59, 130, 246, 0.5) 40%,
                rgba(59, 130, 246, 0.2) 70%,
                transparent 100%);
            border: 2px solid rgba(59, 130, 246, 0.6);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 99999;
            top: 0;
            left: 0;
            opacity: 1;
            transition: transform 0.15s ease,
                        border-color 0.3s ease,
                        background 0.3s ease;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5),
                        0 0 40px rgba(59, 130, 246, 0.3);
        }
        
        /* Simple center dot */
        .custom-cursor::before {
            content: '';
            position: absolute;
            width: 4px;
            height: 4px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: white;
            opacity: 0.9;
        }
        
        /* Clean glow effect */
        .custom-cursor::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            border-radius: 50%;
            background: radial-gradient(circle,
                transparent 30%,
                rgba(59, 130, 246, 0.1) 70%,
                transparent 100%);
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.5);
                opacity: 0.5;
            }
        }
        
        @keyframes shimmer {
            0%, 100% {
                opacity: 0.5;
                transform: rotate(0deg);
            }
            50% {
                opacity: 0.8;
                transform: rotate(180deg);
            }
        }
        
        @keyframes glowPulse {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.8;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 0.4;
            }
        }
        
        .custom-cursor.active {
            transform: translate(-50%, -50%) scale(0.6);
            background: radial-gradient(circle, rgba(16, 185, 129, 0.9), rgba(16, 185, 129, 0.3));
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.7),
                        0 0 60px rgba(16, 185, 129, 0.4);
        }
        
        /* Simple hover state - just change color */
        .custom-cursor.hover {
            background: radial-gradient(circle, 
                rgba(16, 185, 129, 1) 0%, 
                rgba(16, 185, 129, 0.8) 30%,
                rgba(16, 185, 129, 0.4) 60%,
                rgba(16, 185, 129, 0.1) 100%);
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.7),
                        0 0 50px rgba(16, 185, 129, 0.4);
        }
        
        @keyframes magnifyPulse {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.1);
            }
        }
        
        /* Elements get magnified when cursor hovers over them */
        .btn:hover,
        .welcome-cta:hover,
        button:hover,
        a:hover,
        .custom-select-display:hover,
        .custom-select-option:hover,
        .theme-toggle:hover,
        .card:hover {
            transform: scale(1.05);
            transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        
        /* Primary buttons get more magnification */
        .btn-primary:hover,
        .btn-success:hover,
        .welcome-cta:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }
        
        /* Input fields subtle magnification */
        input:hover,
        textarea:hover,
        select:hover {
            transform: scale(1.02);
            transition: transform 0.3s ease;
        }
        
        /* Cards get subtle lift effect */
        .card:hover {
            transform: translateY(-2px) scale(1.01);
        }
        
        /* Stat cards magnify more */
        .stat-card:hover {
            transform: translateY(-4px) scale(1.08);
        }
        
        /* Ensure cursor:none on all interactive elements */
        a, button, input, textarea, select, option, 
        .btn, .form-select, .form-textarea, .form-input, 
        .theme-toggle, .welcome-cta, 
        select:focus, select:hover, select:active,
        option:hover, option:focus,
        input[type="checkbox"], input[type="radio"],
        label, [role="button"], [onclick] {
            cursor: none !important;
        }
        
        /* Specific select dropdown styling */
        select::-ms-expand {
            cursor: none !important;
        }
        
        select option {
            cursor: none !important;
        }
    </style>
    
    {% block head %}{% endblock %}
</head>
<body>
    <!-- Custom Cursor Element -->
    <div class="custom-cursor"></div>
    
    {% block content %}{% endblock %}
    
    <!-- Scripts -->
    <script>
        // Initialize custom cursor for all pages
        document.addEventListener('DOMContentLoaded', function() {
            const cursor = document.querySelector('.custom-cursor');
            if (!cursor) {
                console.error('Custom cursor element not found');
                return;
            }
            
            let mouseX = window.innerWidth / 2;
            let mouseY = window.innerHeight / 2;
            let currentX = mouseX;
            let currentY = mouseY;
            let rafId = null;
            
            // Initialize cursor position
            if (cursor) {
                cursor.style.left = currentX + 'px';
                cursor.style.top = currentY + 'px';
            }
            
            // Subtle smooth cursor movement with very fast response
            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });
            
            function animate() {
                // Very fast interpolation (0.8 = 80% immediate movement)
                const speed = 0.8;
                currentX += (mouseX - currentX) * speed;
                currentY += (mouseY - currentY) * speed;
                
                if (cursor) {
                    cursor.style.left = currentX + 'px';
                    cursor.style.top = currentY + 'px';
                }
                
                rafId = requestAnimationFrame(animate);
            }
            
            // Start animation loop
            animate();
            
            // Add click effect
            document.addEventListener('mousedown', () => {
                cursor.classList.add('active');
            });
            
            document.addEventListener('mouseup', () => {
                cursor.classList.remove('active');
            });
            
            // Change cursor on hover for interactive elements with magnifying effect
            const updateHoverElements = () => {
                const hoverElements = document.querySelectorAll('a, button, input, textarea, select, .btn, .form-select, .form-textarea, .form-input, .theme-toggle, .form-checkbox, label, .card, .model-option, .entity-tag, [role="button"], [onclick], .welcome-cta, .custom-select-option, .custom-select-display');
                
                hoverElements.forEach(elem => {
                    // Remove any existing listeners first to avoid duplicates
                    elem.removeEventListener('mouseenter', handleMouseEnter);
                    elem.removeEventListener('mouseleave', handleMouseLeave);
                    
                    elem.addEventListener('mouseenter', handleMouseEnter);
                    elem.addEventListener('mouseleave', handleMouseLeave);
                });
            };
            
            function handleMouseEnter(e) {
                cursor.classList.add('hover');
                // Cursor stays same size, just changes appearance to look like a lens
            }
            
            function handleMouseLeave() {
                cursor.classList.remove('hover');
            }
            
            // Force cursor:none on all elements
            function forceCursorNone() {
                const allElements = document.querySelectorAll('*');
                allElements.forEach(elem => {
                    elem.style.cursor = 'none';
                });
                
                // Override any inline styles
                const style = document.createElement('style');
                style.innerHTML = `
                    * { cursor: none !important; }
                    *:hover { cursor: none !important; }
                    *:focus { cursor: none !important; }
                    *:active { cursor: none !important; }
                `;
                document.head.appendChild(style);
            }
            
            // Initial setup
            updateHoverElements();
            forceCursorNone();
            
            // Re-setup on DOM changes (for dynamically added elements)
            const observer = new MutationObserver(() => {
                updateHoverElements();
                forceCursorNone();
            });
            
            observer.observe(document.body, {
                childList: true,
                subtree: true,
                attributes: true,
                attributeFilter: ['style']
            });
            
            // Hide cursor when leaving window
            document.addEventListener('mouseleave', () => {
                cursor.style.opacity = '0';
            });
            
            document.addEventListener('mouseenter', () => {
                cursor.style.opacity = '1';
            });
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
