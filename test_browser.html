<!DOCTYPE html>
<html>
<head>
    <title>PII Test</title>
</head>
<body>
    <h1>PII Detection Test</h1>
    <textarea id="input" rows="5" cols="50">My phone is 94216781 and email is john@example.com</textarea>
    <button onclick="testDetection()">Test Detection</button>
    <pre id="result"></pre>
    
    <script>
    async function testDetection() {
        const text = document.getElementById('input').value;
        const resultDiv = document.getElementById('result');
        
        try {
            const response = await fetch('http://localhost:9000/api/extract', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    text: text,
                    model_version: 'v2'
                })
            });
            
            const data = await response.json();
            resultDiv.textContent = JSON.stringify(data, null, 2);
            
            console.log('Response:', data);
            
            if (data.entities && data.entities.length > 0) {
                alert(`Found ${data.entities.length} entities!`);
            } else {
                alert('No entities found!');
            }
        } catch (error) {
            resultDiv.textContent = 'Error: ' + error.message;
            console.error('Error:', error);
        }
    }
    </script>
</body>
</html>
