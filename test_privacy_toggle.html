<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Toggle Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            padding: 20px;
            background: #1a1a2e;
            color: #e5e7eb;
        }
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            background: #2b2b3d;
            padding: 30px;
            border-radius: 12px;
        }
        h1 {
            margin-bottom: 30px;
        }
        .test-section {
            margin-bottom: 25px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }
        .status {
            padding: 5px 10px;
            border-radius: 4px;
            margin-left: 10px;
            font-size: 14px;
        }
        .status.pass {
            background: #10b981;
            color: white;
        }
        .status.fail {
            background: #ef4444;
            color: white;
        }
        button {
            background: #8b5cf6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #7c3aed;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>Privacy Toggle Functionality Test</h1>
        
        <div class="test-section">
            <h3>Test 1: Check Privacy Toggle Exists</h3>
            <button onclick="testPrivacyToggle()">Run Test</button>
            <div id="test1-result" class="result"></div>
        </div>
        
        <div class="test-section">
            <h3>Test 2: Check New Chat Button</h3>
            <button onclick="testNewChatButton()">Run Test</button>
            <div id="test2-result" class="result"></div>
        </div>
        
        <div class="test-section">
            <h3>Test 3: Check Upload Button Tooltip</h3>
            <button onclick="testUploadButton()">Run Test</button>
            <div id="test3-result" class="result"></div>
        </div>
        
        <div class="test-section">
            <h3>Test 4: Privacy Mode Toggle Simulation</h3>
            <button onclick="testPrivacyModeToggle()">Run Test</button>
            <div id="test4-result" class="result"></div>
        </div>
        
        <div class="test-section">
            <h3>Test All</h3>
            <button onclick="runAllTests()">Run All Tests</button>
            <div id="all-results" class="result"></div>
        </div>
    </div>
    
    <script>
        async function testPrivacyToggle() {
            const result = document.getElementById('test1-result');
            try {
                const response = await fetch('http://localhost:9000/chatbot');
                const html = await response.text();
                
                const hasToggle = html.includes('privacy-toggle');
                const hasToggleButton = html.includes('id="privacy-toggle"');
                
                result.innerHTML = `
                    Privacy Toggle Found: <span class="status ${hasToggle ? 'pass' : 'fail'}">${hasToggle ? 'PASS' : 'FAIL'}</span><br>
                    Toggle Button ID Found: <span class="status ${hasToggleButton ? 'pass' : 'fail'}">${hasToggleButton ? 'PASS' : 'FAIL'}</span>
                `;
            } catch (error) {
                result.innerHTML = `Error: ${error.message}`;
            }
        }
        
        async function testNewChatButton() {
            const result = document.getElementById('test2-result');
            try {
                const response = await fetch('http://localhost:9000/chatbot');
                const html = await response.text();
                
                const hasNewChatBtn = html.includes('id="new-chat-btn"');
                const hasNewChatIcon = html.includes('id="new-chat-icon"');
                const hasNewChatText = html.includes('>New Chat<');
                
                result.innerHTML = `
                    New Chat Button Found: <span class="status ${hasNewChatBtn ? 'pass' : 'fail'}">${hasNewChatBtn ? 'PASS' : 'FAIL'}</span><br>
                    New Chat Icon Found: <span class="status ${hasNewChatIcon ? 'pass' : 'fail'}">${hasNewChatIcon ? 'PASS' : 'FAIL'}</span><br>
                    "New Chat" Text Found: <span class="status ${hasNewChatText ? 'pass' : 'fail'}">${hasNewChatText ? 'PASS' : 'FAIL'}</span>
                `;
            } catch (error) {
                result.innerHTML = `Error: ${error.message}`;
            }
        }
        
        async function testUploadButton() {
            const result = document.getElementById('test3-result');
            try {
                const response = await fetch('http://localhost:9000/static/css/document-attachment.css');
                const css = await response.text();
                
                const hasTooltipBefore = css.includes('.chat-upload-btn::before');
                const hasTooltipAfter = css.includes('.chat-upload-btn::after');
                
                result.innerHTML = `
                    Tooltip ::before Removed: <span class="status ${!hasTooltipBefore ? 'pass' : 'fail'}">${!hasTooltipBefore ? 'PASS (Good!)' : 'FAIL (Still Present)'}</span><br>
                    Tooltip ::after Removed: <span class="status ${!hasTooltipAfter ? 'pass' : 'fail'}">${!hasTooltipAfter ? 'PASS (Good!)' : 'FAIL (Still Present)'}</span>
                `;
            } catch (error) {
                result.innerHTML = `Error: ${error.message}`;
            }
        }
        
        async function testPrivacyModeToggle() {
            const result = document.getElementById('test4-result');
            try {
                // Test the API endpoint
                const response = await fetch('http://localhost:9000/api/privacy-chat/test', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: 'Test message with John Doe email john@example.com',
                        privacy_mode: true
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    result.innerHTML = `
                        API Test: <span class="status pass">PASS - Endpoint Accessible</span><br>
                        Response: ${JSON.stringify(data).substring(0, 100)}...
                    `;
                } else {
                    result.innerHTML = `API Test: <span class="status fail">Status ${response.status}</span>`;
                }
            } catch (error) {
                result.innerHTML = `Note: Test endpoint may not exist - this is normal<br>Error: ${error.message}`;
            }
        }
        
        async function runAllTests() {
            const result = document.getElementById('all-results');
            result.innerHTML = 'Running all tests...';
            
            await testPrivacyToggle();
            await testNewChatButton();
            await testUploadButton();
            await testPrivacyModeToggle();
            
            result.innerHTML = '<span class="status pass">All tests completed! Check individual results above.</span>';
        }
    </script>
</body>
</html>
