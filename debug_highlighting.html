<!DOCTYPE html>
<html>
<head>
    <title>Debug Highlighting</title>
    <style>
        body { 
            font-family: Arial; 
            padding: 20px; 
            background: #2b2b3d; 
            color: white; 
        }
        .test-container {
            margin: 20px 0;
            padding: 20px;
            background: #1a1a2e;
            border-radius: 8px;
        }
        .pii-entity { 
            padding: 2px 4px; 
            border-radius: 3px; 
            font-weight: bold; 
            background: rgba(168, 85, 247, 0.3); 
            color: #d8b4fe; 
        }
        button {
            background: #8b5cf6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Debug Highlighting Function</h1>
    
    <div class="test-container">
        <h3>Test 1: Direct Function Call</h3>
        <button onclick="testDirectCall()">Test Direct Call</button>
        <div id="direct-result"></div>
    </div>
    
    <div class="test-container">
        <h3>Test 2: Simulate Streaming</h3>
        <button onclick="simulateStreaming()">Simulate Streaming</button>
        <div id="streaming-result"></div>
    </div>
    
    <div class="test-container">
        <h3>Test 3: Check Browser Console</h3>
        <p>Open browser dev tools (F12) and check console for debug logs</p>
        <button onclick="testConsoleLogging()">Test Console Logging</button>
    </div>
    
    <div class="test-container">
        <h3>Test 4: Real Chatbot Test</h3>
        <button onclick="window.open('http://localhost:9000/privacy-chat', '_blank')">Open Real Chatbot</button>
        <p style="margin-top: 10px; font-size: 14px;">
            Try typing: "My email is test@example.com and contact John Smith"
        </p>
    </div>
    
    <script>
        // Copy the exact function from the JavaScript file
        function highlightStreamingEntities(text) {
            console.log('highlightStreamingEntities called with:', text);
            
            // Avoid processing if text already contains HTML spans to prevent double-highlighting
            if (text.includes('<span class="pii-entity')) {
                console.log('Text already contains highlights, skipping');
                return text;
            }
            
            let highlightedText = text;
            
            // Email pattern - most reliable
            highlightedText = highlightedText.replace(/\\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Z|a-z]{2,}\\b/g, (match) => {
                console.log('Highlighting email:', match);
                return `<span class="pii-entity pii-email">${match}</span>`;
            });
            
            if (highlightedText !== text) {
                console.log('Highlighting applied. Result:', highlightedText);
            }
            
            return highlightedText;
        }
        
        function testDirectCall() {
            const result = document.getElementById('direct-result');
            const testText = 'My email is test@example.com';
            const highlighted = highlightStreamingEntities(testText);
            
            result.innerHTML = `
                <p><strong>Input:</strong> "${testText}"</p>
                <p><strong>Output:</strong> ${highlighted}</p>
                <p><strong>Changed:</strong> ${highlighted !== testText ? 'YES' : 'NO'}</p>
            `;
        }
        
        async function simulateStreaming() {
            const result = document.getElementById('streaming-result');
            const fullText = 'My email is test@example.com';
            const words = fullText.split(' ');
            
            result.innerHTML = '<p>Streaming simulation:</p>';
            
            let currentText = '';
            for (let i = 0; i < words.length; i++) {
                currentText += (i > 0 ? ' ' : '') + words[i];
                const highlighted = highlightStreamingEntities(currentText);
                
                result.innerHTML += `<p>Step ${i+1}: "${currentText}" → ${highlighted}</p>`;
                await new Promise(resolve => setTimeout(resolve, 500));
            }
        }
        
        function testConsoleLogging() {
            console.log('=== Testing Console Logging ===');
            console.log('This should appear in browser dev tools console');
            
            const testText = 'Contact john@test.com for details';
            console.log('Testing with text:', testText);
            
            const result = highlightStreamingEntities(testText);
            console.log('Result:', result);
            console.log('=== End Test ===');
            
            alert('Check the browser console (F12) for debug logs');
        }
        
        // Test on page load
        window.addEventListener('load', () => {
            console.log('Debug page loaded. Testing highlighting function...');
            testDirectCall();
        });
    </script>
</body>
</html>
