<!DOCTYPE html>
<html lang="en" data-theme="dark" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرحباً بك في درع الخصوصية - PII Shield</title>
    <meta name="description" content="منصة متطورة لحماية البيانات الشخصية في المنطقة العربية">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
    
    <style>
        * {
            font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 30%, #16213e  100%);
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }
        
        .welcome-hero {
            background: linear-gradient(135deg, 
                rgba(15, 15, 35, 0.95) 0%, 
                rgba(26, 26, 46, 0.9) 30%, 
                rgba(22, 33, 62, 0.95) 60%,
                rgba(13, 19, 33, 0.98) 100%),
                radial-gradient(circle at 20% 80%, rgba(120, 200, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 200, 120, 0.08) 0%, transparent 50%);
            color: #ffffff;
            text-align: center;
            padding: 5rem 0 8rem 0;
            position: relative;
            overflow: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .welcome-hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 10% 20%, rgba(216, 180, 254, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(34, 197, 94, 0.04) 0%, transparent 25%),
                radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 30%);
            animation: cosmicFloat 25s ease-in-out infinite;
        }
        
        .welcome-hero::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(2px 2px at 20% 30%, rgba(255, 255, 255, 0.15), transparent),
                radial-gradient(2px 2px at 40% 70%, rgba(255, 255, 255, 0.1), transparent),
                radial-gradient(1px 1px at 90% 40%, rgba(255, 255, 255, 0.2), transparent),
                radial-gradient(1px 1px at 60% 10%, rgba(255, 255, 255, 0.08), transparent);
            background-size: 400px 400px, 300px 300px, 200px 200px, 150px 150px;
            animation: starfield 30s linear infinite;
        }
        
        .welcome-content {
            position: relative;
            z-index: 2;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 2rem;
            text-align: center;
        }
        
        .welcome-logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 2rem;
            position: relative;
            animation: logoFloat 4s ease-in-out infinite, logoGlow 2s ease-in-out infinite alternate;
            filter: drop-shadow(0 0 30px rgba(59, 130, 246, 0.4));
        }
        
        .logo-ring {
            position: absolute;
            border: 2px solid rgba(59, 130, 246, 0.3);
            border-radius: 50%;
            animation: rotate 20s linear infinite;
        }
        
        .logo-ring:nth-child(1) {
            width: 140px;
            height: 140px;
            top: -10px;
            left: -10px;
            border-top-color: rgba(34, 197, 94, 0.5);
        }
        
        .logo-ring:nth-child(2) {
            width: 160px;
            height: 160px;
            top: -20px;
            left: -20px;
            border-right-color: rgba(168, 85, 247, 0.4);
            animation: rotate 15s linear infinite reverse;
        }
        
        .welcome-title {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 1rem;
            line-height: 1.1;
            background: linear-gradient(135deg, #ffffff 0%, #e0e7ff 50%, #c7d2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
            animation: textGlow 3s ease-in-out infinite alternate;
        }
        
        .welcome-subtitle {
            font-size: 1.5rem;
            font-weight: 600;
            color: #60a5fa;
            margin-bottom: 1.5rem;
            opacity: 0.9;
        }
        
        .welcome-description {
            font-size: 1.25rem;
            opacity: 0.85;
            margin-bottom: 3rem;
            line-height: 1.6;
            color: #cbd5e1;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .welcome-cta {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            background: linear-gradient(135deg, #3b82f6 0%, #6366f1 50%, #8b5cf6 100%);
            color: white;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 
                0 10px 30px rgba(59, 130, 246, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }
        
        .welcome-cta::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.6s;
        }
        
        .welcome-cta:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 
                0 20px 40px rgba(59, 130, 246, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }
        
        .welcome-cta:hover::before {
            left: 100%;
        }
        
        .cta-icon {
            transition: transform 0.3s ease;
        }
        
        .welcome-cta:hover .cta-icon {
            transform: translateX(5px) rotate(45deg);
        }
        
        
        @keyframes cosmicFloat {
            0%, 100% { transform: translateY(0px) rotate(0deg) scale(1); }
            25% { transform: translateY(-10px) rotate(90deg) scale(1.05); }
            50% { transform: translateY(-15px) rotate(180deg) scale(1.1); }
            75% { transform: translateY(-8px) rotate(270deg) scale(1.03); }
        }
        
        @keyframes starfield {
            from { transform: translateY(0); }
            to { transform: translateY(-200px); }
        }
        
        @keyframes logoFloat {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }
        
        @keyframes logoGlow {
            0% { filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.3)); }
            100% { filter: drop-shadow(0 0 40px rgba(59, 130, 246, 0.6)); }
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes textGlow {
            0% { text-shadow: 0 4px 20px rgba(59, 130, 246, 0.2); }
            100% { text-shadow: 0 4px 30px rgba(59, 130, 246, 0.5); }
        }
        
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .animate-slide-up {
            animation: slideInUp 0.8s ease-out forwards;
            opacity: 0;
        }
        
        @media (max-width: 768px) {
            .welcome-hero {
                padding: 3rem 0 5rem 0;
                min-height: 100vh;
            }
            
            .welcome-title {
                font-size: 2.5rem;
            }
            
            .welcome-subtitle {
                font-size: 1.2rem;
            }
            
            .welcome-description {
                font-size: 1.1rem;
                margin-bottom: 2rem;
            }
            
            .welcome-logo {
                width: 100px;
                height: 100px;
            }
            
            .logo-ring:nth-child(1) {
                width: 120px;
                height: 120px;
            }
            
            .logo-ring:nth-child(2) {
                width: 140px;
                height: 140px;
            }
            
            .welcome-content {
                padding: 0 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Hero Section -->
    <section class="welcome-hero">
        <div class="welcome-content">
            <div class="welcome-logo animate-slide-up">
                <div class="logo-ring"></div>
                <div class="logo-ring"></div>
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="heroLogoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
                            <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
                        </linearGradient>
                        <linearGradient id="shieldGlow" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
                            <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:0.7" />
                        </linearGradient>
                    </defs>
                    <path fill="url(#heroLogoGradient)" d="M50,5 L85,20 C85,45 80,75 50,95 C20,75 15,45 15,20 L50,5 Z" />
                    <circle fill="url(#shieldGlow)" cx="50" cy="50" r="18" />
                    <circle fill="rgba(59, 130, 246, 0.9)" cx="50" cy="50" r="12" />
                    <path stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" d="M40,50 L48,58 L60,46" />
                </svg>
            </div>
            
            <h1 class="welcome-title animate-slide-up">PII-Detector</h1>
            <h2 class="welcome-subtitle animate-slide-up">كاشف البيانات الشخصية</h2>
            <p class="welcome-description animate-slide-up">
                منصة ذكية متطورة لحماية البيانات الشخصية والمعلومات الحساسة في النصوص العربية والإنجليزية
                <br>
                <em style="opacity: 0.7; font-size: 0.9em;">Advanced AI platform for protecting personal data in Arabic and English content</em>
            </p>
            
            <a href="/set-welcome-complete" class="welcome-cta animate-slide-up">
                <span>ابدأ الآن</span>
                <svg class="cta-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="7" y1="17" x2="17" y2="7"/>
                    <polyline points="7,7 17,7 17,17"/>
                </svg>
            </a>
        </div>
    </section>


    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Add staggered animation delays
            const animatedElements = document.querySelectorAll('.animate-slide-up');
            animatedElements.forEach((element, index) => {
                element.style.animationDelay = `${index * 0.2 + 0.3}s`;
            });
            
            // Add floating particles effect
            createFloatingParticles();
        });
        
        function createFloatingParticles() {
            const hero = document.querySelector('.welcome-hero');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.cssText = `
                    position: absolute;
                    width: ${Math.random() * 4 + 1}px;
                    height: ${Math.random() * 4 + 1}px;
                    background: rgba(59, 130, 246, ${Math.random() * 0.5 + 0.2});
                    border-radius: 50%;
                    left: ${Math.random() * 100}%;
                    top: ${Math.random() * 100}%;
                    animation: particleFloat ${Math.random() * 10 + 10}s ease-in-out infinite;
                    animation-delay: ${Math.random() * 5}s;
                `;
                hero.appendChild(particle);
            }
        }
        
        // Add CSS for particle animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes particleFloat {
                0%, 100% { transform: translateY(0px) translateX(0px) scale(1); opacity: 0.2; }
                25% { transform: translateY(-20px) translateX(10px) scale(1.2); opacity: 0.4; }
                50% { transform: translateY(-40px) translateX(-5px) scale(0.8); opacity: 0.6; }
                75% { transform: translateY(-20px) translateX(-10px) scale(1.1); opacity: 0.3; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
