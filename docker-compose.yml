version: '3.8'

services:
  ner-pii-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: ner-pii-nlp:latest
    container_name: ner-pii-container
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MAX_UPLOAD_SIZE=${MAX_UPLOAD_SIZE:-10485760}
    volumes:
      # Persistent data volumes
      - ./logs:/app/logs
      - ./uploads:/app/uploads
      - ./checkpoints:/app/checkpoints:ro  # Read-only for model files
      # Cache volumes for better performance
      - model-cache:/app/cache
      - temp-data:/app/temp
    restart: unless-stopped
    networks:
      - ner-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: ner-pii-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - ner-pii-app
    networks:
      - ner-network
    profiles:
      - production
    restart: unless-stopped

networks:
  ner-network:
    driver: bridge

volumes:
  model-cache:
    driver: local
  temp-data:
    driver: local