<!DOCTYPE html>
<html lang="en" data-theme="dark" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرحباً بك في درع الخصوصية - PII Shield</title>
    <meta name="description" content="منصة متطورة لحماية البيانات الشخصية في المنطقة العربية">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
    
    <style>
        * {
            font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 30%, #16213e  100%);
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }
        
        .welcome-hero {
            background: linear-gradient(135deg, 
                rgba(15, 15, 35, 0.95) 0%, 
                rgba(26, 26, 46, 0.9) 30%, 
                rgba(22, 33, 62, 0.95) 60%,
                rgba(13, 19, 33, 0.98) 100%),
                radial-gradient(circle at 20% 80%, rgba(120, 200, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 200, 120, 0.08) 0%, transparent 50%);
            color: #ffffff;
            text-align: center;
            padding: 5rem 0 8rem 0;
            position: relative;
            overflow: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .welcome-hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 10% 20%, rgba(216, 180, 254, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(34, 197, 94, 0.04) 0%, transparent 25%),
                radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 30%);
            animation: cosmicFloat 25s ease-in-out infinite;
        }
        
        .welcome-hero::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(2px 2px at 20% 30%, rgba(255, 255, 255, 0.15), transparent),
                radial-gradient(2px 2px at 40% 70%, rgba(255, 255, 255, 0.1), transparent),
                radial-gradient(1px 1px at 90% 40%, rgba(255, 255, 255, 0.2), transparent),
                radial-gradient(1px 1px at 60% 10%, rgba(255, 255, 255, 0.08), transparent);
            background-size: 400px 400px, 300px 300px, 200px 200px, 150px 150px;
            animation: starfield 30s linear infinite;
        }
        
        .welcome-content {
            position: relative;
            z-index: 2;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 2rem;
            text-align: center;
        }
        
        .welcome-logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 2rem;
            position: relative;
            animation: logoFloat 4s ease-in-out infinite, logoGlow 2s ease-in-out infinite alternate;
            filter: drop-shadow(0 0 30px rgba(59, 130, 246, 0.4));
        }
        
        .logo-ring {
            position: absolute;
            border: 2px solid rgba(59, 130, 246, 0.3);
            border-radius: 50%;
            animation: rotate 20s linear infinite;
        }
        
        .logo-ring:nth-child(1) {
            width: 140px;
            height: 140px;
            top: -10px;
            left: -10px;
            border-top-color: rgba(34, 197, 94, 0.5);
        }
        
        .logo-ring:nth-child(2) {
            width: 160px;
            height: 160px;
            top: -20px;
            left: -20px;
            border-right-color: rgba(168, 85, 247, 0.4);
            animation: rotate 15s linear infinite reverse;
        }
        
        .logo-ring:nth-child(3) {
            width: 180px;
            height: 180px;
            top: -30px;
            left: -30px;
            border-left-color: rgba(34, 197, 94, 0.3);
            border-bottom-color: rgba(245, 158, 11, 0.3);
            animation: rotate 25s linear infinite;
        }
        
        .welcome-title {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 1rem;
            line-height: 1.1;
            background: linear-gradient(135deg, #ffffff 0%, #e0e7ff 50%, #c7d2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
            animation: textGlow 3s ease-in-out infinite alternate;
        }
        
        .welcome-subtitle {
            font-size: 1.5rem;
            font-weight: 600;
            color: #60a5fa;
            margin-bottom: 1.5rem;
            opacity: 0.9;
        }
        
        .welcome-description {
            font-size: 1.25rem;
            opacity: 0.85;
            margin-bottom: 3rem;
            line-height: 1.6;
            color: #cbd5e1;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .welcome-cta {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            background: linear-gradient(135deg, #3b82f6 0%, #6366f1 50%, #8b5cf6 100%);
            color: white;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 
                0 10px 30px rgba(59, 130, 246, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }
        
        .welcome-cta::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.6s;
        }
        
        .welcome-cta:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 
                0 20px 40px rgba(59, 130, 246, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }
        
        .welcome-cta:hover::before {
            left: 100%;
        }
        
        .cta-icon {
            transition: transform 0.3s ease;
        }
        
        .welcome-cta:hover .cta-icon {
            transform: translateX(5px) rotate(45deg);
        }
        
        
        @keyframes cosmicFloat {
            0%, 100% { transform: translateY(0px) rotate(0deg) scale(1); }
            25% { transform: translateY(-10px) rotate(90deg) scale(1.05); }
            50% { transform: translateY(-15px) rotate(180deg) scale(1.1); }
            75% { transform: translateY(-8px) rotate(270deg) scale(1.03); }
        }
        
        @keyframes starfield {
            from { transform: translateY(0); }
            to { transform: translateY(-200px); }
        }
        
        @keyframes logoFloat {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }
        
        @keyframes logoGlow {
            0% { filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.3)); }
            100% { filter: drop-shadow(0 0 40px rgba(59, 130, 246, 0.6)); }
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes textGlow {
            0% { text-shadow: 0 4px 20px rgba(59, 130, 246, 0.2); }
            100% { text-shadow: 0 4px 30px rgba(59, 130, 246, 0.5); }
        }
        
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .animate-slide-up {
            animation: slideInUp 0.8s ease-out forwards;
            opacity: 0;
        }
        
        @media (max-width: 768px) {
            .welcome-hero {
                padding: 3rem 0 5rem 0;
                min-height: 100vh;
            }
            
            .welcome-title {
                font-size: 2.5rem;
            }
            
            .welcome-subtitle {
                font-size: 1.2rem;
            }
            
            .welcome-description {
                font-size: 1.1rem;
                margin-bottom: 2rem;
            }
            
            .welcome-logo {
                width: 100px;
                height: 100px;
            }
            
            .logo-ring:nth-child(1) {
                width: 120px;
                height: 120px;
            }
            
            .logo-ring:nth-child(2) {
                width: 140px;
                height: 140px;
            }
            
            .welcome-content {
                padding: 0 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Hero Section -->
    <section class="welcome-hero">
        <div class="welcome-content">
            <div class="welcome-logo animate-slide-up">
                <div class="logo-ring"></div>
                <div class="logo-ring"></div>
                <div class="logo-ring"></div>
                <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <!-- Advanced Multi-Stop Gradient with Color Transitions -->
                        <linearGradient id="heroLogoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1">
                                <animate attributeName="stop-color" values="#1e40af;#3b82f6;#6366f1;#1e40af" dur="6s" repeatCount="indefinite"/>
                            </stop>
                            <stop offset="25%" style="stop-color:#3b82f6;stop-opacity:1">
                                <animate attributeName="stop-color" values="#3b82f6;#6366f1;#8b5cf6;#3b82f6" dur="6s" repeatCount="indefinite"/>
                            </stop>
                            <stop offset="50%" style="stop-color:#6366f1;stop-opacity:1">
                                <animate attributeName="stop-color" values="#6366f1;#8b5cf6;#a855f7;#6366f1" dur="6s" repeatCount="indefinite"/>
                            </stop>
                            <stop offset="75%" style="stop-color:#8b5cf6;stop-opacity:1">
                                <animate attributeName="stop-color" values="#8b5cf6;#a855f7;#ec4899;#8b5cf6" dur="6s" repeatCount="indefinite"/>
                            </stop>
                            <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1">
                                <animate attributeName="stop-color" values="#a855f7;#ec4899;#1e40af;#a855f7" dur="6s" repeatCount="indefinite"/>
                            </stop>
                        </linearGradient>
                        <linearGradient id="shieldGlow" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#f0f9ff;stop-opacity:0.9" />
                        </linearGradient>
                        <linearGradient id="innerCore" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#1e40af;stop-opacity:0.9" />
                            <stop offset="100%" style="stop-color:#312e81;stop-opacity:0.8" />
                        </linearGradient>
                        <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8" />
                            <stop offset="70%" style="stop-color:#60a5fa;stop-opacity:0.4" />
                            <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.1" />
                        </radialGradient>
                        <filter id="dropShadow">
                            <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
                            <feOffset dx="2" dy="4" result="offset"/>
                            <feComponentTransfer>
                                <feFuncA type="linear" slope="0.3"/>
                            </feComponentTransfer>
                            <feMerge> 
                                <feMergeNode/>
                                <feMergeNode in="SourceGraphic"/> 
                            </feMerge>
                        </filter>
                        <filter id="glow">
                            <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
                            <feMerge>
                                <feMergeNode in="coloredBlur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                        
                        <!-- Advanced Morphing Gradient -->
                        <radialGradient id="morphingGradient" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9">
                                <animate attributeName="stop-opacity" values="0.9;0.5;0.9" dur="3s" repeatCount="indefinite"/>
                            </stop>
                            <stop offset="50%" style="stop-color:#60a5fa;stop-opacity:0.6">
                                <animate attributeName="stop-color" values="#60a5fa;#34d399;#a78bfa;#60a5fa" dur="4s" repeatCount="indefinite"/>
                            </stop>
                            <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.2">
                                <animate attributeName="stop-opacity" values="0.2;0.4;0.2" dur="2.5s" repeatCount="indefinite"/>
                            </stop>
                        </radialGradient>
                        
                        <!-- Holographic Effect -->
                        <linearGradient id="hologram" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" style="stop-color:rgba(59,130,246,0.8);stop-opacity:0">
                                <animate attributeName="stop-opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
                            </stop>
                            <stop offset="50%" style="stop-color:rgba(34,197,94,0.9);stop-opacity:0.8">
                                <animate attributeName="stop-opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/>
                            </stop>
                            <stop offset="100%" style="stop-color:rgba(168,85,247,0.8);stop-opacity:0">
                                <animate attributeName="stop-opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
                            </stop>
                            <animateTransform attributeName="gradientTransform" type="translate" 
                                            values="-120 0;120 0;-120 0" dur="3s" repeatCount="indefinite"/>
                        </linearGradient>
                        
                        <!-- Advanced Shadow Filter -->
                        <filter id="advancedShadow" x="-50%" y="-50%" width="200%" height="200%">
                            <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
                            <feOffset in="blur" dx="3" dy="6" result="offsetBlur"/>
                            <feFlood flood-color="#1e40af" flood-opacity="0.4" result="color"/>
                            <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
                            <feMerge>
                                <feMergeNode in="shadow"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                    </defs>
                    
                    <!-- Outer protective shield with advanced gradient -->
                    <path fill="url(#heroLogoGradient)" filter="url(#advancedShadow)" 
                          d="M60,8 L95,25 C95,48 90,78 60,102 C30,78 25,48 25,25 L60,8 Z" 
                          transform="scale(0.85)" transform-origin="60 60">
                        <animateTransform attributeName="transform" type="scale" 
                                        values="0.85;0.88;0.85" dur="4s" repeatCount="indefinite"/>
                        <animate attributeName="opacity" values="0.95;0.8;0.95" dur="3s" repeatCount="indefinite"/>
                    </path>
                    
                    <!-- Holographic overlay -->
                    <path fill="url(#hologram)" opacity="0.7"
                          d="M60,8 L95,25 C95,48 90,78 60,102 C30,78 25,48 25,25 L60,8 Z" 
                          transform="scale(0.85)" transform-origin="60 60"/>
                    
                    <!-- Enhanced Security layers with morphing effects -->
                    <circle fill="url(#morphingGradient)" cx="60" cy="60" r="28" opacity="0.7">
                        <animate attributeName="r" values="28;34;28" dur="4s" repeatCount="indefinite"/>
                        <animate attributeName="opacity" values="0.7;0.9;0.7" dur="3s" repeatCount="indefinite"/>
                        <animateTransform attributeName="transform" type="rotate" 
                                        values="0 60 60;360 60 60" dur="20s" repeatCount="indefinite"/>
                    </circle>
                    
                    <circle fill="url(#innerCore)" cx="60" cy="60" r="22" opacity="0.9" filter="url(#glow)">
                        <animate attributeName="r" values="22;26;22" dur="2.5s" repeatCount="indefinite"/>
                        <animate attributeName="opacity" values="0.9;0.6;0.9" dur="2.8s" repeatCount="indefinite"/>
                    </circle>
                    
                    <!-- Pulsing energy ring -->
                    <circle fill="none" stroke="url(#heroLogoGradient)" stroke-width="2" 
                            cx="60" cy="60" r="35" opacity="0.4" stroke-dasharray="5,5">
                        <animate attributeName="r" values="35;40;35" dur="3.5s" repeatCount="indefinite"/>
                        <animate attributeName="stroke-dasharray" values="5,5;10,2;5,5" dur="2s" repeatCount="indefinite"/>
                        <animateTransform attributeName="transform" type="rotate" 
                                        values="0 60 60;-360 60 60" dur="8s" repeatCount="indefinite"/>
                    </circle>
                    
                    <!-- Enhanced AI Detection Core -->
                    <circle fill="url(#shieldGlow)" cx="60" cy="60" r="16" filter="url(#glow)">
                        <animate attributeName="r" values="16;20;16" dur="2s" repeatCount="indefinite"/>
                        <animate attributeName="fill-opacity" values="1;0.7;1" dur="1.5s" repeatCount="indefinite"/>
                    </circle>
                    
                    <!-- Quantum particles around core -->
                    <g opacity="0.8">
                        <circle cx="75" cy="60" r="1.5" fill="rgba(59,130,246,0.9)">
                            <animateMotion dur="4s" repeatCount="indefinite">
                                <mpath href="#orbitPath"/>
                            </animateMotion>
                            <animate attributeName="r" values="1.5;3;1.5" dur="1s" repeatCount="indefinite"/>
                        </circle>
                        <circle cx="45" cy="60" r="1.5" fill="rgba(34,197,94,0.9)">
                            <animateMotion dur="3s" repeatCount="indefinite">
                                <mpath href="#orbitPath2"/>
                            </animateMotion>
                            <animate attributeName="r" values="1.5;3;1.5" dur="1.2s" repeatCount="indefinite"/>
                        </circle>
                    </g>
                    
                    <!-- Invisible orbit paths -->
                    <defs>
                        <path id="orbitPath" d="M 75,60 A 15,15 0 1,1 75,59.9" fill="none"/>
                        <path id="orbitPath2" d="M 45,60 A 12,12 0 1,0 45,59.9" fill="none"/>
                    </defs>
                    
                    <!-- Enhanced Central AI Eye with Neural Network -->
                    <ellipse fill="rgba(59, 130, 246, 0.9)" cx="60" cy="60" rx="12" ry="8" filter="url(#glow)">
                        <animateTransform attributeName="transform" type="scale" 
                                        values="1;1.15;1" dur="1.5s" repeatCount="indefinite"/>
                        <animate attributeName="fill" values="rgba(59,130,246,0.9);rgba(34,197,94,0.9);rgba(168,85,247,0.9);rgba(59,130,246,0.9)" 
                                dur="5s" repeatCount="indefinite"/>
                    </ellipse>
                    <ellipse fill="#ffffff" cx="60" cy="58" rx="8" ry="5">
                        <animate attributeName="opacity" values="1;0.6;1" dur="1.8s" repeatCount="indefinite"/>
                        <animate attributeName="rx" values="8;10;8" dur="2s" repeatCount="indefinite"/>
                    </ellipse>
                    <circle fill="rgba(59, 130, 246, 0.8)" cx="60" cy="58" r="3">
                        <animate attributeName="r" values="3;5;3" dur="1.2s" repeatCount="indefinite"/>
                        <animate attributeName="fill" values="rgba(59,130,246,0.8);rgba(34,197,94,0.8);rgba(168,85,247,0.8);rgba(59,130,246,0.8)" 
                                dur="4s" repeatCount="indefinite"/>
                    </circle>
                    
                    <!-- Neural network connections -->
                    <g opacity="0.5">
                        <path stroke="rgba(59,130,246,0.6)" stroke-width="1" fill="none" 
                              d="M 50,55 Q 55,50 60,55 Q 65,60 70,55">
                            <animate attributeName="stroke-opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite"/>
                        </path>
                        <path stroke="rgba(34,197,94,0.6)" stroke-width="1" fill="none" 
                              d="M 50,65 Q 55,70 60,65 Q 65,60 70,65">
                            <animate attributeName="stroke-opacity" values="0.6;0.2;0.6" dur="2.3s" repeatCount="indefinite"/>
                        </path>
                    </g>
                    
                    <!-- Enhanced Data Scan Lines with Animation -->
                    <g opacity="0.8">
                        <line x1="35" y1="50" x2="50" y2="50" stroke="rgba(59, 130, 246, 0.7)" stroke-width="2" stroke-linecap="round">
                            <animate attributeName="stroke-width" values="2;3;2" dur="1.5s" repeatCount="indefinite"/>
                            <animate attributeName="opacity" values="0.7;1;0.7" dur="1.5s" repeatCount="indefinite"/>
                        </line>
                        <line x1="35" y1="60" x2="48" y2="60" stroke="rgba(59, 130, 246, 0.7)" stroke-width="2" stroke-linecap="round">
                            <animate attributeName="stroke-width" values="2;3;2" dur="1.8s" repeatCount="indefinite"/>
                            <animate attributeName="opacity" values="0.7;1;0.7" dur="1.8s" repeatCount="indefinite"/>
                        </line>
                        <line x1="35" y1="70" x2="46" y2="70" stroke="rgba(59, 130, 246, 0.7)" stroke-width="2" stroke-linecap="round">
                            <animate attributeName="stroke-width" values="2;3;2" dur="2.1s" repeatCount="indefinite"/>
                            <animate attributeName="opacity" values="0.7;1;0.7" dur="2.1s" repeatCount="indefinite"/>
                        </line>
                        
                        <line x1="70" y1="50" x2="85" y2="50" stroke="rgba(59, 130, 246, 0.7)" stroke-width="2" stroke-linecap="round">
                            <animate attributeName="stroke-width" values="2;3;2" dur="1.7s" repeatCount="indefinite"/>
                            <animate attributeName="opacity" values="0.7;1;0.7" dur="1.7s" repeatCount="indefinite"/>
                        </line>
                        <line x1="72" y1="60" x2="85" y2="60" stroke="rgba(59, 130, 246, 0.7)" stroke-width="2" stroke-linecap="round">
                            <animate attributeName="stroke-width" values="2;3;2" dur="2.3s" repeatCount="indefinite"/>
                            <animate attributeName="opacity" values="0.7;1;0.7" dur="2.3s" repeatCount="indefinite"/>
                        </line>
                        <line x1="74" y1="70" x2="85" y2="70" stroke="rgba(59, 130, 246, 0.7)" stroke-width="2" stroke-linecap="round">
                            <animate attributeName="stroke-width" values="2;3;2" dur="1.9s" repeatCount="indefinite"/>
                            <animate attributeName="opacity" values="0.7;1;0.7" dur="1.9s" repeatCount="indefinite"/>
                        </line>
                    </g>
                    
                    <!-- Advanced Multi-Layer Radar Sweep -->
                    <g opacity="0.9">
                        <!-- Primary sweep line with gradient -->
                        <line x1="60" y1="60" x2="60" y2="25" stroke="url(#heroLogoGradient)" stroke-width="4" 
                              transform-origin="60 60" stroke-linecap="round" opacity="0.8">
                            <animateTransform attributeName="transform" type="rotate" 
                                            values="0 60 60;360 60 60" dur="2.5s" repeatCount="indefinite"/>
                            <animate attributeName="stroke-width" values="4;2;4" dur="1s" repeatCount="indefinite"/>
                        </line>
                        
                        <!-- Secondary sweep line -->
                        <line x1="60" y1="60" x2="60" y2="30" stroke="rgba(168,85,247,0.7)" stroke-width="2" 
                              transform-origin="60 60" stroke-linecap="round">
                            <animateTransform attributeName="transform" type="rotate" 
                                            values="120 60 60;480 60 60" dur="2.5s" repeatCount="indefinite"/>
                        </line>
                        
                        <!-- Multi-ring detection zones -->

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Add staggered animation delays
            const animatedElements = document.querySelectorAll('.animate-slide-up');
            animatedElements.forEach((element, index) => {
                element.style.animationDelay = `${index * 0.2 + 0.3}s`;
            });
            
            // Add floating particles effect
            createFloatingParticles();
        });
        
        function createFloatingParticles() {
            const hero = document.querySelector('.welcome-hero');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.cssText = `
                    position: absolute;
                    width: ${Math.random() * 4 + 1}px;
                    height: ${Math.random() * 4 + 1}px;
                    background: rgba(59, 130, 246, ${Math.random() * 0.5 + 0.2});
                    border-radius: 50%;
                    left: ${Math.random() * 100}%;
                    top: ${Math.random() * 100}%;
                    animation: particleFloat ${Math.random() * 10 + 10}s ease-in-out infinite;
                    animation-delay: ${Math.random() * 5}s;
                `;
                hero.appendChild(particle);
            }
        }
        
        // Add CSS for particle animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes particleFloat {
                0%, 100% { transform: translateY(0px) translateX(0px) scale(1); opacity: 0.2; }
                25% { transform: translateY(-20px) translateX(10px) scale(1.2); opacity: 0.4; }
                50% { transform: translateY(-40px) translateX(-5px) scale(0.8); opacity: 0.6; }
                75% { transform: translateY(-20px) translateX(-10px) scale(1.1); opacity: 0.3; }
            }
        `;
        document.head.appendChild(style);
    </script>
