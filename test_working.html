<!DOCTYPE html>
<html>
<head>
    <title>Test PII System Works</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .box { border: 2px solid #ccc; border-radius: 10px; padding: 20px; }
        textarea { width: 100%; height: 200px; padding: 10px; font-size: 16px; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #0056b3; }
        #results { min-height: 200px; background: #f8f9fa; padding: 15px; border-radius: 5px; }
        #dictionary { background: #e9ecef; padding: 15px; border-radius: 5px; min-height: 100px; }
        .entity-item { background: white; padding: 8px; margin: 5px 0; border-radius: 5px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>🔒 PII Detection Test - Direct API</h1>
    
    <div class="container">
        <div class="box">
            <h2>Input</h2>
            <textarea id="input" placeholder="Enter text here...">John Smith works at Microsoft. Sarah Johnson works at Google.</textarea>
            <br><br>
            <button onclick="testAPI()">Test API</button>
            <button onclick="clearAll()">Clear</button>
            <div id="status"></div>
        </div>
        
        <div class="box">
            <h2>Results</h2>
            <div id="results">Results will appear here...</div>
        </div>
    </div>
    
    <div class="box" style="margin-top: 20px;">
        <h2>Entity Dictionary</h2>
        <div id="dictionary">Dictionary mappings will appear here...</div>
    </div>

    <script>
        // Simple entity dictionary for testing
        const entityMappings = new Map();
        const entityCounts = new Map();
        
        function generateMapping(text, type) {
            const key = `${text}:${type}`;
            if (entityMappings.has(key)) {
                return entityMappings.get(key);
            }
            
            if (!entityCounts.has(type)) {
                entityCounts.set(type, 0);
            }
            
            const count = entityCounts.get(type) + 1;
            entityCounts.set(type, count);
            
            const typeNames = {
                'PER': 'Person',
                'ORG': 'Organization', 
                'LOC': 'Location',
                'EMAIL': 'Email',
                'PHONE': 'Phone'
            };
            
            const typeName = typeNames[type] || type;
            const mapping = `${typeName}${count}`;
            entityMappings.set(key, mapping);
            
            return mapping;
        }
        
        async function testAPI() {
            const input = document.getElementById('input').value;
            const statusDiv = document.getElementById('status');
            const resultsDiv = document.getElementById('results');
            const dictDiv = document.getElementById('dictionary');
            
            if (!input.trim()) {
                statusDiv.innerHTML = '<div class="status error">Please enter some text</div>';
                return;
            }
            
            statusDiv.innerHTML = '<div class="status">Processing...</div>';
            
            try {
                const response = await fetch('http://localhost:9000/api/extract', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        text: input,
                        model_version: 'v2'
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                
                // Clear previous mappings
                entityMappings.clear();
                entityCounts.clear();
                
                // Process entities
                let maskedText = input;
                const mappingsList = [];
                
                if (data.entities && data.entities.length > 0) {
                    // Sort entities by position (reverse) to avoid position shift
                    const sortedEntities = [...data.entities].sort((a, b) => b.start - a.start);
                    
                    // Generate mappings and replace text
                    sortedEntities.forEach(entity => {
                        const mapping = generateMapping(entity.text, entity.entity_type);
                        mappingsList.push({
                            original: entity.text,
                            type: entity.entity_type,
                            mapped: mapping
                        });
                        
                        // Replace in text
                        maskedText = maskedText.substring(0, entity.start) + mapping + maskedText.substring(entity.end);
                    });
                }
                
                // Display results
                resultsDiv.innerHTML = `
                    <h3>Original (with highlights):</h3>
                    <div style="padding: 10px; background: white; border-radius: 5px; margin: 10px 0;">
                        ${data.highlighted_text || 'No entities detected'}
                    </div>
                    <h3>Privacy Mode (masked):</h3>
                    <div style="padding: 10px; background: #f0f8ff; border-radius: 5px; margin: 10px 0;">
                        ${maskedText}
                    </div>
                `;
                
                // Display dictionary
                if (mappingsList.length > 0) {
                    const dictHTML = mappingsList.reverse().map(m => 
                        `<div class="entity-item">
                            <strong>${m.original}</strong> (${m.type}) → <span style="color: #007bff;">${m.mapped}</span>
                        </div>`
                    ).join('');
                    
                    dictDiv.innerHTML = `
                        <div style="margin-bottom: 10px;">Total mappings: ${mappingsList.length}</div>
                        ${dictHTML}
                    `;
                } else {
                    dictDiv.innerHTML = 'No entities detected';
                }
                
                statusDiv.innerHTML = '<div class="status success">✅ Analysis complete!</div>';
                
            } catch (error) {
                statusDiv.innerHTML = `<div class="status error">❌ Error: ${error.message}</div>`;
                console.error('Error:', error);
            }
        }
        
        function clearAll() {
            document.getElementById('input').value = '';
            document.getElementById('results').innerHTML = 'Results will appear here...';
            document.getElementById('dictionary').innerHTML = 'Dictionary mappings will appear here...';
            document.getElementById('status').innerHTML = '';
            entityMappings.clear();
            entityCounts.clear();
        }
        
        // Test on load with default text
        window.addEventListener('DOMContentLoaded', () => {
            console.log('Test page ready. Click "Test API" to begin.');
        });
    </script>
</body>
</html>
